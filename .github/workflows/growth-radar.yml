name: Growth Radar

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: growth-radar-hourly
  cancel-in-progress: false

jobs:
  collect-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run Growth Radar
        env:
          GROWTH_RADAR_MIN_SCORE: "15"
          GOOGLE_SHEETS_SYNC: "false"
          PYTHONUNBUFFERED: "1"
        run: python main.py

      - name: Save updated database and exports
        run: |
          git config user.name "growth-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ mvp-results/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "Update Growth Radar data"
            git push
          fi
