name: MVP smoke test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-mvp:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: pytest -q

      - name: Run live MVP collection
        env:
          GROWTH_RADAR_MIN_SCORE: "15"
        run: python main.py

      - name: Validate company output
        run: |
          test -f data/latest_events.csv
          test -f data/company_pipeline.csv
          test -f data/outreach_ready.csv
          python - <<'PY'
          import csv
          from pathlib import Path

          path = Path("data/company_pipeline.csv")
          with path.open(encoding="utf-8-sig") as file:
              rows = list(csv.DictReader(file))

          required = {
              "company", "inn", "okved_main", "market_segment",
              "market_subsegment", "owner_name", "direct_contact_found",
              "outreach_ready", "status"
          }
          assert rows, "Company pipeline is empty"
          assert required.issubset(rows[0]), f"Missing columns: {required - set(rows[0])}"
          print(f"Companies: {len(rows)}")
          PY

      - name: Upload MVP result
        uses: actions/upload-artifact@v4
        with:
          name: growth-radar-mvp-result
          path: |
            data/latest_events.csv
            data/company_pipeline.csv
            data/outreach_ready.csv
