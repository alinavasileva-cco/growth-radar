name: MVP smoke test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-mvp:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: pytest -q

      - name: Run live MVP collection
        env:
          GROWTH_RADAR_MIN_SCORE: "15"
        run: python main.py

      - name: Validate CSV output
        run: |
          test -f data/latest_events.csv
          python - <<'PY'
          import csv
          from pathlib import Path

          path = Path("data/latest_events.csv")
          with path.open(encoding="utf-8-sig") as file:
              rows = list(csv.reader(file))

          assert rows, "CSV is empty"
          assert rows[0][:5] == ["Дата", "Компания", "Событие", "Сигнал", "Балл"]
          print(f"CSV rows including header: {len(rows)}")
          PY

      - name: Upload MVP result
        uses: actions/upload-artifact@v4
        with:
          name: growth-radar-mvp-result
          path: data/latest_events.csv
